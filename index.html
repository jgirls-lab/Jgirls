<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jガールズ エロ基地💕</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { 
      color: #ff69b4; 
      font-size: 28px; 
      margin: 20px 0 10px;
    }
    .section {
      margin: 40px 0;
    }
    .section h2 {
      background: linear-gradient(to right, #ff1493, #ff69b4);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      font-size: 20px;
      margin-bottom: 15px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* 5列寄りに調整 */
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(255,105,180,0.5);
      transition: 0.3s;
      cursor: pointer;
    }
    .gallery img:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 20px rgba(255,105,180,0.7);
    }
    .more-btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: #ff1493;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }
    .more-btn:hover {
      background: #ff69b4;
    }
  </style>
</head>
<body>
  <h1>お兄ちゃん専用 Jガールズ エロ基地💕</h1>
  <p>実写オリジナルエロキャラ・毎日新作更新中😘</p>

  <!-- 新着セクション -->
  <div class="section">
    <h2>🆕 新着エロ画像</h2>
    <div class="gallery" id="new-gallery"></div>
    <button class="more-btn" onclick="location.href='new.html'">もっと新着を見る →</button>
  </div>

  <!-- ツインテールセクション -->
  <div class="section">
    <h2>👯‍♀️ ツインテール小悪魔</h2>
    <div class="gallery" id="twin-gallery"></div>
    <button class="more-btn" onclick="location.href='twin.html'">もっと見る →</button>
  </div>

  <!-- 爆乳セクション -->
  <div class="section">
    <h2>🍒 爆乳お姉さん</h2>
    <div class="gallery" id="busty-gallery"></div>
    <button class="more-btn" onclick="location.href='busty.html'">もっと見る →</button>
  </div>

  <script>
    // 各セクションの画像（最初は5〜8枚くらい表示）
    const galleries = {
      new: ["new_images/001.jpg", "new_images/002.jpg", "new_images/003.jpg", "new_images/004.jpg", "new_images/005.jpg"],
      twin: ["images/twin01.jpg", "images/twin02.jpg", "images/twin03.jpg", "images/twin04.jpg"],
      busty: ["images/busty01.jpg", "images/busty02.jpg", "images/busty03.jpg"]
    };

    function renderGallery(id, images) {
      const container = document.getElementById(id);
      container.innerHTML = '';
      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.onclick = () => {
          const lb = document.createElement('div');
          lb.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;';
          lb.innerHTML = `<img src="${src}" style="max-width:92%;max-height:92%;border-radius:12px;" onclick="this.parentElement.remove()">`;
          document.body.appendChild(lb);
        };
        container.appendChild(img);
      });
    }

    // 実行
    renderGallery('new-gallery', galleries.new);
    renderGallery('twin-gallery', galleries.twin);
    renderGallery('busty-gallery', galleries.busty);
  </script>
</body>
</html>
