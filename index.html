<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jガールズ エロ基地💕</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      margin: 0;
      padding: 20px 10px;
      text-align: center;
    }
    h1 {
      color: #ff69b4;
      font-size: 28px;
      margin: 15px 0 30px;
    }
    .section {
      margin-bottom: 50px;
    }
    .section h2 {
      background: linear-gradient(to right, #ff1493, #ff69b4);
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 20px;
      display: inline-block;
      margin-bottom: 18px;
      box-shadow: 0 4px 10px rgba(255,20,147,0.4);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); /* 5列寄せ */
      gap: 14px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(255,105,180,0.5);
      transition: all 0.35s ease;
      display: block;
    }
    .gallery img:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 25px rgba(255,105,180,0.7);
    }
    .more-btn {
      margin-top: 25px;
      padding: 14px 35px;
      background: #ff1493;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .more-btn:hover {
      background: #ff69b4;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>お兄ちゃん専用 Jガールズ エロ基地💕</h1>
  <p style="color:#ff1493; font-size:18px;">実写オリジナルエロキャラ・毎日更新中😘</p>

  <!-- 新着セクション -->
  <div class="section">
    <h2>🆕 新着エロ画像</h2>
    <div class="gallery" id="new-gallery"></div>
    <button class="more-btn" onclick="location.href='new.html'">もっと新着を見る →</button>
  </div>

  <!-- ツインテールセクション -->
  <div class="section">
    <h2>👯‍♀️ ツインテール小悪魔</h2>
    <div class="gallery" id="twin-gallery"></div>
    <button class="more-btn" onclick="location.href='twin.html'">もっと見る →</button>
  </div>

  <!-- 爆乳セクション -->
  <div class="section">
    <h2>🍒 爆乳お姉さん</h2>
    <div class="gallery" id="busty-gallery"></div>
    <button class="more-btn" onclick="location.href='busty.html'">もっと見る →</button>
  </div>
