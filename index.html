<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sidebar Masonry</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  background:#fafafa;
}

/* サイドバー */
.sidebar{
  width:220px;
  height:100vh;
  background:white;
  border-right:1px solid #ddd;
  padding:20px;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  font-size:20px;
  margin-bottom:20px;
}

.tabs button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  background:#eee;
  cursor:pointer;
  border-radius:8px;
  transition:.2s;
}

.tabs button:hover{
  background:#ddd;
}

.tabs .active{
  background:#333;
  color:white;
}

/* メイン */
.main{
  flex:1;
  height:100vh;
  overflow-y:auto;
}

/* Masonry */
.grid{
  column-count:5;
  column-gap:10px;
  padding:10px;
}

.item{
  break-inside: avoid;
  margin-bottom:10px;
}

.item img{
  width:100%;
  border-radius:10px;
  transition:.2s;
}

.item img:hover{
  transform:scale(1.03);
}

/* タグ */
.tag-area{
  display:none;
  padding:20px;
}

.search{
  margin-bottom:20px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tag{
  padding:8px 12px;
  background:#eee;
  border-radius:20px;
  cursor:pointer;
  transition:.2s;
}

.tag:hover{
  background:#ddd;
}
</style>
</head>

<body>

<!-- サイドバー -->
<div class="sidebar">
  <div class="logo">LOGO</div>

  <div class="tabs">
    <button class="active" onclick="showTab('gallery', this)">ギャラリー</button>
    <button onclick="showTab('search', this)">検索</button>
  </div>
</div>

<!-- メイン -->
<div class="main">

  <!-- ギャラリー -->
  <div class="grid" id="gallery">
    <div class="item"><img src="https://picsum.photos/300/400"></div>
    <div class="item"><img src="https://picsum.photos/300/200"></div>
    <div class="item"><img src="https://picsum.photos/300/500"></div>
    <div class="item"><img src="https://picsum.photos/300/250"></div>
    <div class="item"><img src="https://picsum.photos/300/350"></div>
    <div class="item"><img src="https://picsum.photos/300/600"></div>
  </div>

  <!-- 検索＆タグ -->
  <div class="tag-area" id="tagArea">

    <div class="search">
      <input type="text" placeholder="検索フォーム">
    </div>

    <div class="tags">
      <div class="tag">保育</div>
      <div class="tag">遊び</div>
      <div class="tag">食育</div>
      <div class="tag">行事</div>
      <div class="tag">制作</div>
      <div class="tag">園庭</div>
      <div class="tag">室内</div>
      <div class="tag">0歳</div>
      <div class="tag">1歳</div>
      <div class="tag">2歳</div>
    </div>

  </div>

</div>

<script>
function showTab(type, el){

  document.querySelectorAll(".tabs button")
    .forEach(btn => btn.classList.remove("active"));

  el.classList.add("active");

  if(type === "gallery"){
    document.getElementById("gallery").style.display = "block";
    document.getElementById("tagArea").style.display = "none";
  }else{
    document.getElementById("gallery").style.display = "none";
    document.getElementById("tagArea").style.display = "block";
  }
}
</script>

</body>
</html>
